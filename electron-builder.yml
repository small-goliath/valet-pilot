appId: com.valet-pilot.app
productName: Valet Pilot
directories:
  output: dist-app
  buildResources: build

files:
  - dist/main/**/*
  - dist/preload/**/*
  - dist/renderer/**/*
  - node_modules/**/*
  - package.json

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.productivity

dmg:
  title: Valet Pilot
